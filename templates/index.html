<!DOCTYPE html>
<html>
<head>
    <title>Food Recommender</title>
</head>
<body>

<h1>🍽️ Food Recommendation System</h1>

<form method="POST">
    <select name="food">
        {% for food in food_list %}
            <option value="{{ food }}">{{ food }}</option>
        {% endfor %}
    </select>

    <br><br>
    <button type="submit">Recommend</button>
</form>

{% if recommendations %}
    <h2>Recommended Foods:</h2>
    <ul>
        {% for item in recommendations %}
            <li>{{ item }}</li>
        {% endfor %}
    </ul>
{% endif %}

</body>
</html>
